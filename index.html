<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Learning Roadmap Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#1a7c6e;--teal2:#2a9d8f;--teal3:#3dbfb0;
  --dark:#1e2c2c;--panel:#192424;--panel2:#1e2e2e;
}
html,body{height:100%;overflow:hidden;background:#0f1a1a;font-family:'Noto Sans KR',sans-serif;color:#c8dede;}

/* ══ APP LAYOUT ══ */
.app{display:grid;grid-template-rows:46px 1fr;grid-template-columns:200px 1fr 270px;height:100vh;}

/* ── TOPBAR ── */
.topbar{
  grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 14px;
  background:#090f0f;border-bottom:1px solid #1a2e2e;z-index:100;
}
.tb-logo{font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;color:#3dbfb0;letter-spacing:2px;}
.sep{width:1px;height:20px;background:#1a3030;margin:0 4px;}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid #1e3535;background:transparent;color:#6aacac;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;}
.tb-btn:hover{background:#1a2e2e;color:#3dbfb0;}
.tb-btn.green{background:#1a7c6e;color:#fff;border-color:#2a9d8f;}
.tb-btn.green:hover{background:#2a9d8f;}
.tb-nav{display:flex;gap:3px;}
.tb-nav button{width:28px;height:28px;border-radius:5px;border:1px solid #1e3535;background:transparent;color:#6aacac;cursor:pointer;transition:.15s;font-size:14px;display:flex;align-items:center;justify-content:center;}
.tb-nav button:hover{background:#1a2e2e;}
.tb-nav button:disabled{opacity:.2;cursor:default;}
.tb-info{margin-left:auto;font-family:'Montserrat',sans-serif;font-size:11px;color:#3a5a5a;}

/* ── LEFT SLIDES PANEL ── */
.panel-l{background:var(--panel);border-right:1px solid #1a2e2e;display:flex;flex-direction:column;overflow:hidden;}
.ph{padding:9px 12px;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#4a7070;border-bottom:1px solid #1a2e2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ph button{background:transparent;border:1px solid #1e4040;color:#4a8888;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;}
.ph button:hover{background:#1a2e2e;}
.slides-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
.slides-list::-webkit-scrollbar{width:3px;}
.slides-list::-webkit-scrollbar-thumb{background:#1a3535;}
.sthumb{border-radius:7px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative;aspect-ratio:16/9;background:#1e3030;}
.sthumb:hover{border-color:#2a7070;}
.sthumb.on{border-color:#3dbfb0;box-shadow:0 0 0 1px #3dbfb0;}
.sthumb-inner{width:100%;height:100%;background:linear-gradient(135deg,#d5ece7,#e5f3ef);display:flex;flex-direction:column;}
.sthumb-hdr{height:16%;background:#1a7c6e;display:flex;align-items:center;padding:0 5px;}
.sthumb-t{font-family:'Montserrat',sans-serif;font-size:4.5px;font-weight:900;color:#fff;letter-spacing:.5px;}
.sthumb-body{flex:1;display:flex;align-items:center;justify-content:center;font-size:6px;color:#1a7c6e;font-weight:700;opacity:.6;}
.sthumb-n{position:absolute;bottom:3px;left:5px;font-size:8px;font-weight:700;font-family:'Montserrat',sans-serif;color:rgba(255,255,255,.35);}

/* ── CANVAS ── */
.canvas-area{background:#111c1c;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.canvas-wrap{transform-origin:center center;position:relative;}
.slide-canvas{width:1920px;height:1080px;overflow:hidden;position:relative;}
.zoombar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;background:#090f0f;border:1px solid #1a2e2e;border-radius:20px;padding:3px 10px;z-index:50;}
.zoombar button{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:#5aacac;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.zoombar button:hover{background:#1a2e2e;}
.zpct{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:#4a8888;min-width:36px;text-align:center;}

/* ── RIGHT PANEL ── */
.panel-r{background:var(--panel);border-left:1px solid #1a2e2e;display:flex;flex-direction:column;overflow:hidden;}
.ptabs{display:flex;border-bottom:1px solid #1a2e2e;flex-shrink:0;}
.ptab{flex:1;padding:9px 0;text-align:center;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:#4a6666;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.ptab.on{color:#3dbfb0;border-bottom-color:#3dbfb0;}
.pbody{flex:1;overflow-y:auto;padding:12px;}
.pbody::-webkit-scrollbar{width:3px;}
.pbody::-webkit-scrollbar-thumb{background:#1a3535;}
.plabel{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#2a9d8f;text-transform:uppercase;margin-bottom:5px;display:block;}
.pinput,.ptarea{width:100%;background:#0a1818;border:1px solid #1a3535;border-radius:5px;color:#a0c8c8;font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:6px 9px;outline:none;transition:.15s;resize:vertical;}
.pinput:focus,.ptarea:focus{border-color:#2a9d8f;}
.ptarea{min-height:55px;line-height:1.6;}
.psec{margin-bottom:13px;}
.prow{display:flex;gap:7px;}
.prow .psec{flex:1;}
.pdiv{height:1px;background:#1a2e2e;margin:11px 0;}
.papply{width:100%;padding:8px;background:#1a7c6e;border:none;border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;margin-top:4px;transition:.15s;}
.papply:hover{background:#2a9d8f;}
.papply.ok{background:#1a5a40;}

/* ── FULLSCREEN ── */
.fs{display:none;position:fixed;inset:0;z-index:9000;background:#060c0c;flex-direction:column;align-items:center;justify-content:center;}
.fs.on{display:flex;}
.fs-slide{position:relative;overflow:hidden;}
.fs-inner{width:1920px;height:1080px;transform-origin:top left;position:absolute;top:0;left:0;}
.fs-nav-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.55);border-radius:999px;padding:7px 18px;backdrop-filter:blur(8px);}
.fs-nav-bar button{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.fs-nav-bar button:hover{background:rgba(255,255,255,.1);}
.fs-nav-bar button:disabled{opacity:.2;cursor:default;}
.fs-pg{font-family:'Montserrat',sans-serif;font-size:11px;color:rgba(255,255,255,.45);}
.fs-x{position:fixed;top:14px;right:16px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:7px;padding:5px 12px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);}
.fs-x:hover{color:#fff;}

/* ── CTX MENU ── */
.ctx{position:fixed;background:#0a1414;border:1px solid #1a3535;border-radius:8px;box-shadow:0 8px 36px rgba(0,0,0,.5);z-index:8000;min-width:155px;overflow:hidden;animation:cpop .1s ease;display:none;}
@keyframes cpop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.ctx-colors{display:flex;gap:4px;padding:8px 10px;flex-wrap:wrap;}
.cdot{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s;flex-shrink:0;}
.cdot:hover{transform:scale(1.25);}
.csep{height:1px;background:#1a2e2e;}
.citem{padding:7px 12px;font-size:11px;color:#7ab8b8;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.5px;transition:.1s;display:flex;align-items:center;gap:6px;}
.citem:hover{background:#1a2828;color:#fff;}
.citem.del{color:#d06060;}
.citem.del:hover{background:#220e0e;}

/* ── OWNER DOT on chip ── */
.chip-wrap{display:flex;align-items:flex-start;gap:4px;margin-bottom:3px;}
.owner-dot{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;color:#fff;margin-top:2px;
  font-family:'Montserrat',sans-serif;letter-spacing:0;
}

/* ── SLIDE TYPE MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.on{display:flex;}
.modal{background:#0f1a1a;border:1px solid #1a3535;border-radius:14px;padding:28px 32px;min-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal h3{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:#3dbfb0;letter-spacing:2px;margin-bottom:20px;}
.modal-types{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.modal-type{
  padding:16px 12px;border-radius:10px;border:1.5px solid #1a3535;
  background:#0a1414;cursor:pointer;text-align:center;transition:.15s;
}
.modal-type:hover{border-color:#2a9d8f;background:#0f1e1e;}
.modal-type .mt-icon{font-size:28px;margin-bottom:6px;}
.modal-type .mt-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#3dbfb0;margin-bottom:3px;}
.modal-type .mt-desc{font-size:10px;color:#4a7070;line-height:1.4;}
.modal-cancel{width:100%;padding:8px;background:transparent;border:1px solid #1a3535;border-radius:7px;color:#4a7070;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;}
.modal-cancel:hover{border-color:#2a9d8f;color:#3dbfb0;}

/* ── CTX owner section ── */
.ctx-owners{display:flex;gap:5px;padding:7px 10px;align-items:center;}
.ctx-owner-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;font-family:'Montserrat',sans-serif;border:2px solid transparent;transition:.12s;flex-shrink:0;}
.ctx-owner-dot:hover{transform:scale(1.2);border-color:#fff;}
.ctx-owner-dot.none-dot{background:#1a3535;color:#4a8080;border:2px dashed #2a4040;}

/* ── TOAST ── */
.toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:rgba(26,124,110,.9);color:#fff;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:6px 16px;border-radius:999px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:500;white-space:nowrap;}
.toast.on{opacity:1;}

/* ══ INLINE EDIT GLOW ══ */
[contenteditable]:hover{outline:2px dashed rgba(61,191,176,.35);border-radius:3px;cursor:text;}
[contenteditable]:focus{outline:2px solid rgba(61,191,176,.75);border-radius:3px;background:rgba(255,255,255,.1);}
.s1circ[contenteditable]:hover{outline:3px dashed rgba(61,191,176,.4);border-radius:50%;}
.s1circ[contenteditable]:focus{outline:3px solid rgba(61,191,176,.8);border-radius:50%;background:rgba(255,255,255,.95);}

/* ══════════════════════════════════════════════════
   SHARED SLIDE SHELL (s3~s8 공통)
══════════════════════════════════════════════════ */
.slide-shell{width:100%;height:100%;position:relative;overflow:hidden;background:linear-gradient(145deg,#d6ebe6 0%,#e4f2ee 45%,#cbe5de 100%);}
.shell-hdr{position:absolute;top:0;left:0;right:0;height:78px;background:linear-gradient(90deg,#155e5e,#1a7c6e 60%,#1e8080);padding:8px 36px;display:flex;align-items:center;gap:0;z-index:5;}
.shell-hdr-texts{display:flex;flex-direction:column;}
.shell-sub{font-size:11px;color:rgba(255,255,255,.75);}
.shell-title{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;line-height:1;}
.shell-date{font-family:'Montserrat',sans-serif;font-size:14px;color:rgba(255,255,255,.6);margin-top:2px;}
.shell-badge{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 24px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;}
.shell-body{position:absolute;top:78px;left:0;right:0;bottom:0;overflow:hidden;}

/* ══════════════════════════════════════════════════
   SLIDE 3 — 연간 교육 계획 캘린더
══════════════════════════════════════════════════ */
.annual-wrap{width:100%;height:100%;padding:4px 10px;overflow:hidden;}
.annual-tbl{width:100%;border-collapse:separate;border-spacing:2px;table-layout:fixed;}
.annual-tbl colgroup col.col-cat{width:135px;}
.annual-tbl colgroup col.col-name{width:210px;}
.annual-tbl colgroup col.col-type{width:78px;}
.annual-tbl colgroup col.col-m{/* auto, 12 cols share remaining ~1490px ≈ 124px each */}
.ath{background:#1e2c2c;color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;letter-spacing:.3px;text-align:center;padding:5px 2px;border-radius:5px;}
.ath.cat-hdr{font-size:14px;}
.annual-tbl tr{height:22px;}
.atd-cat{
  background:#1a7c6e;color:#fff;border-radius:7px;
  text-align:center;vertical-align:middle;
  font-size:12px;font-weight:700;letter-spacing:.3px;
  padding:1px 3px;line-height:1.1;
}
.atd-name{
  background:rgba(255,255,255,.65);border-radius:7px;
  vertical-align:middle;padding:1px 5px;
  font-size:12px;font-weight:600;color:#1e2c2c;line-height:1.15;
}
.atd-type{
  background:rgba(255,255,255,.4);border-radius:7px;
  vertical-align:middle;text-align:center;
  font-size:11px;font-weight:600;color:#3a6060;
  padding:1px;line-height:1.15;
}
.atd-m{
  border-radius:5px;vertical-align:middle;text-align:center;
  font-size:10px;font-weight:600;color:#1e2c2c;
  padding:0px;line-height:1.1;cursor:text;
}
.atd-m.active{color:#2a4040;}
.atd-m.strong{color:#1a2828;font-weight:700;}
.atd-m.light{background:rgba(0,0,0,.02);}
.atd-m.light:hover{background:rgba(0,0,0,.06);outline:1px dashed rgba(26,124,110,.3);}
.atd-m.light:focus{background:rgba(255,255,255,.9);outline:2px solid rgba(61,191,176,.7);}

/* ══════════════════════════════════════════════════
   SLIDES 5~8 — 카테고리 상세 카드
══════════════════════════════════════════════════ */
.catd-grid{display:grid;gap:8px;padding:8px 16px;height:100%;}
.catd-card{
  background:rgba(255,255,255,.7);border-radius:10px;
  padding:8px 12px;display:flex;flex-direction:column;gap:3px;
  border-left:5px solid #1a7c6e;
  box-shadow:0 2px 8px rgba(26,124,110,.08);
  overflow:hidden;
}
.catd-top-row{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.catd-card-name{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;color:#1e2c2c;line-height:1.15;flex:1;min-width:0;}
.catd-card-type-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:15px;font-weight:700;font-family:'Montserrat',sans-serif;letter-spacing:.5px;}
.catd-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.catd-meta-item{display:flex;align-items:center;gap:3px;font-size:15px;color:#3a6060;}
.catd-meta-label{font-size:13px;font-weight:700;font-family:'Montserrat',sans-serif;color:#7aacac;letter-spacing:.5px;text-transform:uppercase;}
.catd-owners{display:flex;gap:3px;cursor:pointer;padding:1px 3px;border-radius:6px;transition:.15s;flex-shrink:0;}
.catd-owners:hover{background:rgba(26,124,110,.12);}
.catd-owner-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;font-family:'Montserrat',sans-serif;}
.catd-owner-dot.sub{outline:2px solid rgba(255,255,255,.7);}
.catd-content{font-size:16px;color:#3a5050;line-height:1.45;border-top:1px solid rgba(26,124,110,.1);padding-top:3px;flex:1;overflow:hidden;}
.catd-section-header{
  background:#1a7c6e;color:#fff;border-radius:10px;
  padding:8px 16px;display:flex;align-items:center;gap:12px;
  font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;letter-spacing:1.5px;
  grid-column:1/-1;
}
.catd-section-count{background:rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:13px;}

/* ══════════════════════════════════════════════════
   SLIDE 1 — pixel-accurate VALUE SYSTEM
══════════════════════════════════════════════════ */
.s1-wrap{width:100%;height:100%;position:relative;overflow:hidden;background:linear-gradient(145deg,#d6ebe6 0%,#e4f2ee 45%,#cbe5de 100%);}

/* teal header bar */
.s1-hdrbar{position:absolute;top:0;left:0;right:0;height:108px;background:#1a7c6e;padding:18px 58px;display:flex;flex-direction:column;justify-content:center;}
.s1-hsub{font-size:17px;color:rgba(255,255,255,.8);letter-spacing:.5px;margin-bottom:4px;}
.s1-hrow{display:flex;align-items:baseline;gap:18px;}
.s1-htitle{font-family:'Montserrat',sans-serif;font-size:58px;font-weight:900;color:#fff;letter-spacing:5px;line-height:1;}
.s1-hdate{font-family:'Montserrat',sans-serif;font-size:19px;color:rgba(255,255,255,.65);}

/* olive young logo + line + badge row */
.s1-logoline{position:absolute;top:140px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:0;white-space:nowrap;}
.s1-oy{display:flex;flex-direction:column;align-items:flex-start;gap:0;}
.s1-oy-name{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;color:#1a7c6e;letter-spacing:1px;}
.s1-oy-leaf{width:14px;height:14px;background:#e8b84b;border-radius:50%;display:inline-block;margin:0 2px;}
.s1-oy-sub{font-size:15px;font-weight:500;color:#2a9d8f;}
.s1-hline{width:60px;height:2px;background:#aaccc8;margin:0 16px;}
.s1-badge{background:#1e2c2c;color:#fff;border-radius:999px;padding:11px 52px;font-size:27px;font-weight:700;letter-spacing:2px;box-shadow:0 4px 18px rgba(0,0,0,.2);}

/* mission */
.s1-mission{position:absolute;top:218px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap;}
.s1-mvlabel{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:#1e2c2c;letter-spacing:3px;margin-bottom:4px;}
.s1-mvtext{font-size:56px;font-weight:700;color:#1a7c6e;letter-spacing:1px;}

/* decorative ribbon waves */
.s1-deco{position:absolute;top:210px;left:50%;transform:translateX(-50%);width:900px;height:500px;pointer-events:none;z-index:1;}

/* venn circles */
.s1-circles{position:absolute;top:380px;left:50%;transform:translateX(-50%);width:780px;height:450px;z-index:3;}
.s1circ{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:26px;line-height:1.15;letter-spacing:1px;color:#1a7c6e;background:rgba(255,255,255,.88);border:4px solid #1a7c6e;backdrop-filter:blur(4px);transition:.15s;}
.s1circ:hover{background:rgba(255,255,255,.98);}
.c-story{width:248px;height:248px;left:0;top:28px;}
.c-smart{width:248px;height:248px;right:0;top:28px;}
.c-brand{width:248px;height:248px;left:50%;transform:translateX(-50%);top:170px;}
.c-core{width:172px;height:172px;left:50%;transform:translateX(-50%);top:85px;font-size:20px;z-index:10;
  color:#fff;background:linear-gradient(135deg,#0d5c52,#1a7c6e,#2a9d8f);border:3px solid #3dffd2;
  box-shadow:0 0 18px rgba(61,255,210,.5),0 0 50px rgba(42,157,143,.35),0 8px 32px rgba(0,0,0,.2);
  text-shadow:0 0 12px rgba(61,255,210,.6),0 0 24px rgba(42,157,143,.3);
}

/* ══ ZOOM ══ */
function fz(){
  const ca=document.getElementById('ca');
  const z=Math.min((ca.clientWidth-40)/1920,(ca.clientHeight-56)/1080);
  sz(Math.round(z*20)/20);
}
function sz(z){
  zoom=Math.min(Math.max(z,.1),1.5);
  const cw=document.getElementById('cw');
  cw.style.transform=`scale(${zoom})`;
  cw.style.width='1920px';cw.style.height='1080px';
  document.getElementById('zpct').textContent=Math.round(zoom*100)+'%';
}
window.addEventListener('resize',fz);

/* ══ RENDER ══ */
function go(i){
  if(i<0||i>=slides.length)return;
  cur=i;
  const s=slides[i];
  const el=document.getElementById('sc');
  el.className='slide-canvas';
  if(s.type==='value')   {el.innerHTML=buildS1(s.data);bindS1(s.data);}
  if(s.type==='roadmap') {el.innerHTML=buildS2(s.data);bindS2(i);}
  if(s.type==='annual')  {el.innerHTML=buildAnnual(s.data);bindShell(s.data);}
  if(s.type==='rrmap')   {el.innerHTML=buildS3(s.data);bindShell(s.data);}
  if(s.type==='catdetail'){el.innerHTML=buildCatDetail(s.data);bindShell(s.data);}
  chrome();buildProp();
}

/* Shared inline edit bind for shell slides (annual, rrmap, catdetail) */
function bindShell(d){
  // Header fields
  document.querySelectorAll('[data-shk]').forEach(el=>{
    el.addEventListener('blur',()=>{d[el.dataset.shk]=el.innerText.trim();save();});
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  // Annual table cells
  document.querySelectorAll('[data-gk]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const {gk,gi,ri,m}=el.dataset;
      const group=d.groups&&d.groups[+gi];
      if(!group)return;
      if(gk==='cat'){group.cat=el.innerText.trim().replace(/<br>/g,'\n');}
      else if(gk==='name'&&group.rows[+ri]){group.rows[+ri].name=el.innerText.trim();}
      else if(gk==='type'&&group.rows[+ri]){group.rows[+ri].type=el.innerText.trim();}
      else if(gk==='month'&&group.rows[+ri]){
        const row=group.rows[+ri]; const mn=+m;
        const txt=el.innerText.trim();
        if(!row.notes)row.notes={};
        if(!row.m)row.m=[];
        if(txt&&txt!==''){
          if(!row.m.includes(mn))row.m.push(mn);
          row.notes[mn]=txt==='●'?undefined:txt;
        } else {
          row.m=row.m.filter(x=>x!==mn);
          delete row.notes[mn];
        }
      }
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  // RR table cells
  document.querySelectorAll('[data-rrk]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const {rrk,ri}=el.dataset;
      const flatRows=[];
      (d.groups||[]).forEach(g=>g.items.forEach(item=>flatRows.push(item)));
      const item=flatRows[+ri];
      if(!item)return;
      if(rrk==='cat'){/* cat spans, skip direct edit for now */}
      else if(rrk==='cat2')item.cat2=el.innerText.trim();
      else if(rrk==='task')item.task=el.innerText.trim();
      else if(rrk==='target')item.target=el.innerText.trim();
      else if(rrk==='content')item.content=el.innerText.trim();
      else if(rrk==='cycle')item.cycle=el.innerText.trim();
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  // Catdetail card cells
  document.querySelectorAll('[data-cdk]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const {cdk,si,ii}=el.dataset;
      const sec=d.sections&&d.sections[+si];
      if(!sec)return;
      const item=sec.items&&sec.items[+ii];
      if(!item)return;
      item[cdk]=el.innerText.trim();
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  // Catdetail section headers
  document.querySelectorAll('[data-csk]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const sec=d.sections&&d.sections[+el.dataset.csk];
      if(sec)sec.title=el.innerText.replace(/\d+개 과정/,'').trim();
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  // Catdetail owner picker
  document.querySelectorAll('.catd-owners[data-cosi]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      showCatOwnerPicker(el,+el.dataset.cosi,+el.dataset.coii);
    });
  });
}

/* Convert hex color to pastel versions */
function hexToPastel(hex,strength){
  // strength: 0.2 = very light, 0.4 = medium pastel
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mix=(c,s)=>Math.round(c*s+255*(1-s));
  return `rgb(${mix(r,strength)},${mix(g,strength)},${mix(b,strength)})`;
}

function buildAnnual(d){
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  // Count total rows for height calc
  const totalRows=d.groups.reduce((a,g)=>a+g.rows.length,0);
  
  let tbody='';
  d.groups.forEach((g,gi)=>{
    const pStrong=hexToPastel(g.color||'#1a7c6e',0.45);
    const pActive=hexToPastel(g.color||'#1a7c6e',0.25);
    g.rows.forEach((row,ri)=>{
      const isFirst=ri===0;
      tbody+=`<tr>`;
      if(isFirst){
        tbody+=`<td class="atd-cat" rowspan="${g.rows.length}" style="background:${g.color}" contenteditable="true" data-gk="cat" data-gi="${gi}" spellcheck="false">${g.cat.replace(/\n/g,'<br>')}</td>`;
      }
      tbody+=`<td class="atd-name" contenteditable="true" data-gk="name" data-gi="${gi}" data-ri="${ri}" spellcheck="false">${row.name}</td>`;
      tbody+=`<td class="atd-type" contenteditable="true" data-gk="type" data-gi="${gi}" data-ri="${ri}" spellcheck="false">${row.type}</td>`;
      for(let m=1;m<=12;m++){
        const active=row.m&&row.m.includes(m);
        const note=row.notes&&row.notes[m];
        let cls='atd-m';
        let content='';
        let sty='';
        if(active&&note){cls+=' strong';content=note;sty=`background:${pStrong};color:#1a2828;font-weight:700`;}
        else if(active){cls+=' active';content='●';sty=`background:${pActive};color:#2a4040`;}
        else{cls+=' light';}
        tbody+=`<td class="${cls}" style="${sty}" contenteditable="true" data-gk="month" data-gi="${gi}" data-ri="${ri}" data-m="${m}" spellcheck="false">${content}</td>`;
      }
      tbody+=`</tr>`;
    });
  });

  return`<div class="slide-shell">
  <div class="shell-hdr">
    <div class="shell-hdr-texts">
      <div class="shell-sub" contenteditable="true" data-shk="topSub" spellcheck="false">${d.topSub}</div>
      <div style="display:flex;align-items:baseline;gap:14px">
        <div class="shell-title" contenteditable="true" data-shk="topTitle" spellcheck="false">${d.topTitle}</div>
        <div class="shell-date" contenteditable="true" data-shk="topDate" spellcheck="false">${d.topDate}</div>
      </div>
    </div>
    <div class="shell-badge" contenteditable="true" data-shk="badge" spellcheck="false">${d.badge||'연간 교육계획'}</div>
  </div>
  <div class="shell-body">
    <div class="annual-wrap">
      <table class="annual-tbl">
        <colgroup>
          <col class="col-cat">
          <col class="col-name">
          <col class="col-type">
          ${[...Array(12)].map(()=>'<col class="col-m">').join('')}
        </colgroup>
        <thead>
          <tr>
            <th class="ath cat-hdr">구분</th>
            <th class="ath">교육명</th>
            <th class="ath">방식</th>
            ${MONTHS.map(m=>`<th class="ath">${m}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  </div>
</div>`;
}

  // Reset if missing, wrong length, or old version
  if(!d.colCfg||d.colCfg.length!==8||!d._colVer||d._colVer<3){
    d.colCfg=JSON.parse(JSON.stringify(RR_COL_DEFAULTS));
    d._colVer=3;
  }
  return d.colCfg;
}

/* ══ SLIDE 2 BUILD ══ */
function buildS2(d){
  const mkChips=(chips,ri,ci)=>{
    if(!chips||!chips.length) return `<div class="chip-add" data-r="${ri}" data-c="${ci}">+ 추가</div>`;
    return chips.map((ch,pi)=>{
      const owner=ch.o?OMAP[ch.o]:null;
      const dot=owner?`<span class="owner-dot" style="background:${owner.bg};min-width:18px">${owner.char}</span>`:'';
      return `<div class="chip-wrap"><div class="chip ${ch.c}" data-r="${ri}" data-c="${ci}" data-p="${pi}" contenteditable="true" spellcheck="false" style="flex:1">${br(ch.t)}</div>${dot}</div>`;
    }).join('')+`<div class="chip-add" data-r="${ri}" data-c="${ci}">+ 추가</div>`;
  };

  // Build table rows
  let tbody='';
  d.rows.forEach((row,ri)=>{
    tbody+=`<tr>`;
    // Row label — editable
    tbody+=`<td class="td-rowlbl" contenteditable="true" spellcheck="false" data-s2r="${ri}">${br(row)}</td>`;
    // CUSTOMIZED LEARNING — only on first row with rowspan=4, editable
    if(ri===0){
      tbody+=`<td class="td-custom" rowspan="4"><div class="td-custom-inner" contenteditable="true" spellcheck="false" data-s2custom="1">CUSTOMIZED LEARNING<br><br><span style="font-size:15px;opacity:.65;letter-spacing:2px">사업부 요청교육</span></div></td>`;
    }
    // 6 data columns
    for(let ci=0;ci<6;ci++){
      const chips=(d.cells[ri]&&d.cells[ri][ci])||[];
      tbody+=`<td class="g-cell" data-r="${ri}" data-c="${ci}"><div class="g-cell-inner">${mkChips(chips,ri,ci)}</div></td>`;
    }
    tbody+=`</tr>`;
  });

  return`<div class="s2-wrap">
  <!-- HEADER BAR -->
  <div class="s2-hdrbar">
    <div class="s2-htexts">
      <div class="s2-hsub">${d.topSub}</div>
      <div class="s2-hrow">
        <div class="s2-htitle">${d.topTitle}</div>
        <div class="s2-hdate">${d.topDate}</div>
      </div>
    </div>
  </div>

  <!-- DIRECTION LABELS -->
  <div class="s2-dirs">
    <div class="s2-dir-group"><span class="dir-arr">←</span><span class="s2-dir-label">CORE COMPETENCE</span></div>
    <div class="s2-dir-group"><span class="dir-arr">←</span><span class="s2-dir-label">FUNDAMENTAL</span></div>
    <div class="s2-dir-group"><span class="s2-dir-label">SUPPORT</span></div>
  </div>

  <!-- LEGEND -->
  <div class="s2-legend">
    <div class="s2-leg-row">
      <div class="s2-li"><div class="s2-ld" style="background:#cce8e4;border:1.5px solid #2a9d8f"></div>글로벌사업부</div>
      <div class="s2-li"><div class="s2-ld" style="background:#d4ede9;border:1.5px solid #2a9d8f"></div>실무</div>
      <div class="s2-li"><div class="s2-ld" style="border:2px dashed #2a9d8f;background:transparent"></div>진행예정</div>
    </div>
    <div class="s2-leg-row">
      <div class="s2-li"><div class="s2-ld" style="background:#1a7c6e"></div>브랜드사업본부</div>
      <div class="s2-li"><div class="s2-ld" style="background:#fce8f4;border:1.5px solid #e879b8"></div>위탁입사자</div>
      <div class="s2-li"><div class="s2-ld" style="background:#1e2c2c"></div>공통</div>
    </div>
    <div class="s2-names">
      ${OWNERS.map(o=>`<div class="s2-name"><div class="name-dot" style="background:${o.bg}">${o.char}</div>${o.label}</div>`).join('')}
    </div>
  </div>

  <!-- TABLE -->
  <div class="s2-tbl-wrap">
    <table class="s2-tbl">
      <colgroup>
        <col style="width:110px">
        <col style="width:130px">
        <col><col><col><col><col><col>
      </colgroup>
      <thead>
        <tr>
          <th class="th-pill oy">OLIVE YOUNG<br><span style="font-size:10px;opacity:.8;font-weight:500">브랜드사업본부</span></th>
          <th class="th-pill empty"></th>
          ${d.cols.map(c=>`<th class="th-pill">${c}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table>
  </div>
</div>`;
}

function bindS2(si){
  const d=slides[si].data;
  /* Row label inline edit */
  document.querySelectorAll('[data-s2r]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const ri=+el.dataset.s2r;
      d.rows[ri]=el.innerText.trim().replace(/\n/g,'\n');
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  /* CUSTOMIZED LEARNING text edit */
  document.querySelectorAll('[data-s2custom]').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
  });
  /* Chips */
  document.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('focus',()=>{el.classList.add('editing');toast();});
    el.addEventListener('blur',()=>{
      el.classList.remove('editing');
      const r=+el.dataset.r,c=+el.dataset.c,p=+el.dataset.p;
      if(!d.cells[r])d.cells[r]=[];
      if(!d.cells[r][c])d.cells[r][c]=[];
      const txt=el.innerText.trim();
      if(!txt){d.cells[r][c].splice(p,1);save();go(si);}
      else{d.cells[r][c][p].t=txt;save();}
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
    el.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();ctxChip=el;showCtx(e.clientX,e.clientY);});
  });
  document.querySelectorAll('.chip-add').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const r=+btn.dataset.r,c=+btn.dataset.c;
      if(!d.cells[r])d.cells[r]=[];
      if(!d.cells[r][c])d.cells[r][c]=[];
      d.cells[r][c].push({t:'새 항목',c:'c-lteal'});
      save();go(si);
      setTimeout(()=>{
        const all=document.querySelectorAll(`.chip[data-r="${r}"][data-c="${c}"]`);
        if(all.length)all[all.length-1].focus();
      },40);
    });
  });
}

/* ══ FULLSCREEN ══ */
function openFS(){
  fsIdx=cur;
  document.getElementById('fs').classList.add('on');
  renderFS();
}
function closeFS(){document.getElementById('fs').classList.remove('on');}
function fsn(d){fsIdx=Math.max(0,Math.min(slides.length-1,fsIdx+d));renderFS();}
function renderFS(){
  const s=slides[fsIdx];
  const fss=document.getElementById('fss');
  const fsi=document.getElementById('fsi');
  // Size the slide container to fill screen maintaining 16:9
  const vw=window.innerWidth,vh=window.innerHeight;
  const sc=Math.min(vw/1920,vh/1080);
  const fw=1920*sc,fh=1080*sc;
  fss.style.cssText=`width:${fw}px;height:${fh}px;position:relative;overflow:hidden;`;
  fsi.style.transform=`scale(${sc})`;
  fsi.style.transformOrigin='top left';
  fsi.style.width='1920px';fsi.style.height='1080px';
  if(s.type==='value')    fsi.innerHTML=buildS1(s.data);
  if(s.type==='roadmap')  fsi.innerHTML=buildS2(s.data);
  if(s.type==='annual')   fsi.innerHTML=buildAnnual(s.data);
  if(s.type==='rrmap')    fsi.innerHTML=buildS3(s.data);
  if(s.type==='catdetail')fsi.innerHTML=buildCatDetail(s.data);
  document.getElementById('fspg').textContent=`${fsIdx+1} / ${slides.length}`;
  document.getElementById('fsbp').disabled=fsIdx===0;
  document.getElementById('fsbn').disabled=fsIdx===slides.length-1;
}
window.addEventListener('resize',()=>{if(document.getElementById('fs').classList.contains('on'))renderFS();});

function showCtx(x,y){
  const m=document.getElementById('ctx');
  // Color dots
  document.getElementById('ctxc').innerHTML=COLORS.map(c=>
    `<div class="cdot" style="background:${c.bg};border:2px solid ${c.bg==='transparent'?'#2a9d8f':c.bg}" onclick="ctxColor('${c.k}')" title="${c.label}"></div>`
  ).join('');
  // Owner dots
  const curOwner=ctxChip?slides[cur].data.cells[+ctxChip.dataset.r][+ctxChip.dataset.c][+ctxChip.dataset.p].o:null;
  document.getElementById('ctxOwners').innerHTML=
    `<div class="ctx-owner-dot none-dot ${!curOwner?'border-color:#3dbfb0':''}" onclick="ctxOwner(null)" title="담당자 없음">✕</div>`+
    OWNERS.map(o=>
      `<div class="ctx-owner-dot ${curOwner===o.k?'outline:2px solid #fff;':''}" style="background:${o.bg};${curOwner===o.k?'outline:3px solid #fff;':''}" onclick="ctxOwner('${o.k}')" title="${o.label}">${o.char}</div>`
    ).join('');
  m.style.display='block';
  m.style.left=Math.min(x,window.innerWidth-180)+'px';
  m.style.top=Math.min(y,window.innerHeight-200)+'px';
}
function ctxOwner(ownerKey){
  if(!ctxChip)return;
  const r=+ctxChip.dataset.r,c=+ctxChip.dataset.c,p=+ctxChip.dataset.p;
  if(ownerKey) slides[cur].data.cells[r][c][p].o=ownerKey;
  else delete slides[cur].data.cells[r][c][p].o;
  save();go(cur);hideCtx();
}
function hideCtx(){document.getElementById('ctx').style.display='none';document.getElementById('catOwnerPicker').style.display='none';}
document.addEventListener('click',e=>{
  if(e.target.closest('#ctx')||e.target.closest('#catOwnerPicker')||e.target.closest('.catd-owners')||e.target.closest('.panel-r'))return;
  hideCtx();
},true);

/* ══ CATDETAIL OWNER PICKER ══ */
let _catOwnerTarget=null; // {si, ii}
function showCatOwnerPicker(el,si,ii){
  _catOwnerTarget={si,ii};
  const d=slides[cur].data;
  const sec=d.sections&&d.sections[si];
  if(!sec)return;
  const item=sec.items&&sec.items[ii];
  if(!item)return;
  const owners=item.owners||[];
  const coKey=item.co||'';
  // Main owners
  document.getElementById('catOwnerMain').innerHTML=OWNERS.map(o=>{
    const active=owners.includes(o.k);
    return`<div class="ctx-owner-dot" style="background:${o.bg};${active?'outline:3px solid #3dbfb0;':'opacity:.4;'}" data-cow="${o.k}" data-cotype="main" title="${o.label}">${o.char}</div>`;
  }).join('');
  // Sub owners
  document.getElementById('catOwnerSub').innerHTML=
    `<div class="ctx-owner-dot none-dot" data-cow="" data-cotype="sub" title="없음" style="${!coKey?'outline:2px solid #3dbfb0;':''}">✕</div>`+
    OWNERS.map(o=>{
      const active=coKey===o.k;
      return`<div class="ctx-owner-dot" style="background:${o.bg};${active?'outline:3px solid #7aacac;':'opacity:.4;'}" data-cow="${o.k}" data-cotype="sub" title="${o.label}">${o.char}</div>`;
    }).join('');
  // Bind clicks
  document.querySelectorAll('#catOwnerMain .ctx-owner-dot, #catOwnerSub .ctx-owner-dot').forEach(dot=>{
    dot.addEventListener('click',e=>{
      e.stopPropagation();
      const key=dot.dataset.cow;
      const type=dot.dataset.cotype;
      const t=_catOwnerTarget;if(!t)return;
      const item2=slides[cur].data.sections[t.si].items[t.ii];
      if(type==='main'){
        if(!item2.owners)item2.owners=[];
        if(item2.owners.includes(key)) item2.owners=item2.owners.filter(k=>k!==key);
        else item2.owners.push(key);
      } else {
        item2.co=key||'';
      }
      save();go(cur);
      // Re-show picker at same position
      setTimeout(()=>{
        const newEl=document.querySelector(`.catd-owners[data-cosi="${t.si}"][data-coii="${t.ii}"]`);
        if(newEl) showCatOwnerPicker(newEl,t.si,t.ii);
      },50);
    });
  });
  const pk=document.getElementById('catOwnerPicker');
  const rect=el.getBoundingClientRect();
  pk.style.display='block';
  pk.style.left=Math.min(rect.right+5,window.innerWidth-200)+'px';
  pk.style.top=Math.min(rect.top,window.innerHeight-250)+'px';
}
function ctxColor(k){
  if(!ctxChip)return;
  ctxChip.className='chip '+k+' editing';
  const r=+ctxChip.dataset.r,c=+ctxChip.dataset.c,p=+ctxChip.dataset.p;
  slides[cur].data.cells[r][c][p].c=k;
  save();hideCtx();
}
function ctxDup(){
  if(!ctxChip)return;
  const r=+ctxChip.dataset.r,c=+ctxChip.dataset.c,p=+ctxChip.dataset.p;
  const o={...slides[cur].data.cells[r][c][p]};
  slides[cur].data.cells[r][c].splice(p+1,0,o);
  save();go(cur);hideCtx();
}
function ctxDel(){
  if(!ctxChip)return;
  const r=+ctxChip.dataset.r,c=+ctxChip.dataset.c,p=+ctxChip.dataset.p;
  slides[cur].data.cells[r][c].splice(p,1);
  save();go(cur);hideCtx();
}

/* Bind owner panel events — event delegation on #pb */
(function(){
  const pb=document.getElementById('pb');
  pb.addEventListener('click',e=>{
    const delBtn=e.target.closest('.ow-del-btn');
    if(delBtn){
      e.stopPropagation();
      removeOwner(+delBtn.dataset.oidx);
      return;
    }
    if(e.target.id==='btn-apply-owners'||e.target.closest('#btn-apply-owners')){
      e.stopPropagation();
      applyOwners();
      return;
    }
    if(e.target.id==='btn-add-owner'||e.target.closest('#btn-add-owner')){
      e.stopPropagation();
      addOwner();
      return;
    }
  });
  /* Range slider live update for R&R column config */
  pb.addEventListener('input',e=>{
    if(e.target.type==='range'&&e.target.dataset.rrcol!==undefined){
      const ci=+e.target.dataset.rrcol;
      const prop=e.target.dataset.rrprop;
      const val=+e.target.value;
      const d=slides[cur].data;
      if(!d.colCfg)rrCols(d);
      d.colCfg[ci][prop]=val;
      // Update value label
      if(prop==='w'){
        const lbl=document.getElementById('rr_w_v'+ci);
        if(lbl)lbl.textContent=val>0?val+'px':'자동';
      } else {
        const lbl=document.getElementById('rr_fs_v'+ci);
        if(lbl)lbl.textContent=val+'px';
      }
    }
  });
  /* Apply on slider mouseup/touchend */
  pb.addEventListener('change',e=>{
    if(e.target.type==='range'&&e.target.dataset.rrcol!==undefined){
      save();go(cur);
    }
  });
})();
function bindOwnerPanel(){/* now handled by delegation above */}
function addOwner(){
  const newKey='u'+Date.now().toString(36);
  const hues=['#9c27b0','#ff5722','#009688','#795548','#607d8b','#e91e63','#3f51b5','#00bcd4'];
  const bg=hues[OWNERS.length%hues.length];
  const newOwner={k:newKey,label:'새 담당자',char:'新',bg:bg};
  OWNERS.push(newOwner);
  OMAP[newKey]=newOwner;
  save();buildProp();
}
function removeOwner(idx){
  if(OWNERS.length<=1)return;
  const removed=OWNERS.splice(idx,1)[0];
  delete OMAP[removed.k];
  // Clean up references in ALL slide types
  slides.forEach(s=>{
    if(s.type==='roadmap'&&s.data.cells){
      s.data.cells.forEach(row=>row&&row.forEach(col=>col&&col.forEach(ch=>{if(ch.o===removed.k)delete ch.o;})));
    }
    if(s.type==='catdetail'&&s.data.sections){
      s.data.sections.forEach(sec=>sec.items&&sec.items.forEach(item=>{
        if(item.owners) item.owners=item.owners.filter(k=>k!==removed.k);
        if(item.co===removed.k) item.co='';
      }));
    }
  });
  save();go(cur);
}
function applyOwners(){
  OWNERS.forEach((o,i)=>{
    const label=document.getElementById('ow_label_'+i);
    const char=document.getElementById('ow_char_'+i);
    const bg=document.getElementById('ow_bg_'+i);
    if(label) o.label=label.value.trim();
    if(char) o.char=char.value.trim().slice(0,2);
    if(bg) o.bg=bg.value;
    OMAP[o.k]=o;
  });
  save();go(cur);
  const btn=document.getElementById('owner-list')?.nextElementSibling;
  if(btn){btn.textContent='✓ 저장됨';setTimeout(()=>{btn.textContent='👤 담당자 저장';},1500);}
}

/* ══ PDF DOWNLOAD ══ */
async function downloadPDF(){
  const prog=document.getElementById('pdfProg');
  const fill=document.getElementById('pdfFill');
  const text=document.getElementById('pdfText');
  prog.style.display='block';
  fill.style.width='0%';
  fill.style.background='';
  text.textContent='렌더링 준비 중...';

  try{
  /* 16:9 비율 PDF 페이지 */
  const pW=338.667, pH=190.5;
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:[pH,pW]});

  /* 메인 캔버스 영역을 활용: 현재 슬라이드 렌더러를 그대로 사용 */
  const wrap=document.getElementById('cw');
  const sc=document.getElementById('sc');
  const origCur=cur;

  /* 슬라이드 영역을 정확히 1920x1080으로 고정 */
  const origWrapStyle=wrap.style.cssText;
  const origScStyle=sc.style.cssText;
  wrap.style.cssText='width:1920px!important;height:1080px!important;overflow:hidden!important;position:fixed!important;left:0!important;top:0!important;z-index:99998!important;background:#fff!important;';
  sc.style.cssText='width:1920px!important;height:1080px!important;transform:none!important;';

  await document.fonts.ready;

  for(let i=0;i<slides.length;i++){
    fill.style.width=Math.round((i/slides.length)*90)+'%';
    text.textContent=`슬라이드 ${i+1}/${slides.length} 캡처 중...`;

    /* 슬라이드 렌더링 */
    go(i);
    /* contenteditable 일시 제거 */
    const editables=sc.querySelectorAll('[contenteditable]');
    editables.forEach(el=>el.setAttribute('contenteditable','false'));

    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,500));

    const canvas=await html2canvas(sc,{
      width:1920,height:1080,scale:2,
      useCORS:true,allowTaint:true,
      backgroundColor:null,logging:false,
      x:0,y:0,scrollX:0,scrollY:0,
      windowWidth:1920,windowHeight:1080,
    });

    const imgData=canvas.toDataURL('image/jpeg',0.95);
    if(i>0) pdf.addPage([pH,pW],'landscape');
    pdf.addImage(imgData,'JPEG',0,0,pW,pH);

    /* contenteditable 복원 */
    editables.forEach(el=>el.setAttribute('contenteditable','true'));
  }

  /* 원래 상태 복원 */
  wrap.style.cssText=origWrapStyle;
  sc.style.cssText=origScStyle;
  go(origCur);
  fz();

  fill.style.width='100%';
  text.textContent='PDF 저장 중...';
  await new Promise(r=>setTimeout(r,100));
  pdf.save('Learning_Roadmap.pdf');
  setTimeout(()=>{prog.style.display='none';},1200);

  }catch(e){
    console.error('PDF 생성 오류:',e);
    text.textContent='오류 발생: '+e.message;
    fill.style.background='#ff4444';
    setTimeout(()=>{prog.style.display='none';},3000);
  }
}

function resetData(){
  /* Two-click reset: first click arms, second click fires */
  const btn=document.querySelector('[onclick="resetData()"]');
  if(btn&&!btn.dataset.armed){
    btn.dataset.armed='1';
    btn.textContent='⚠ 정말 초기화?';
    btn.style.color='#ff4444';btn.style.borderColor='#ff4444';
    setTimeout(()=>{btn.dataset.armed='';btn.textContent='↺ 초기화';btn.style.color='#d08060';btn.style.borderColor='#3a2525';},3000);
    return;
  }
  localStorage.removeItem('lrm8');

  location.reload();
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
let _tt;
function toast(){
  const el=document.getElementById('toast');el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2500);
}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{
  if(document.getElementById('fs').classList.contains('on')){
    if(['ArrowRight','ArrowDown','PageDown'].includes(e.key))fsn(1);
    if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key))fsn(-1);
    if(e.key==='Escape')closeFS();
    return;
  }
  if(document.activeElement&&document.activeElement.isContentEditable)return;
  if(['ArrowRight','ArrowDown'].includes(e.key))go(cur+1);
  if(['ArrowLeft','ArrowUp'].includes(e.key))go(cur-1);
});
